version: '3.8'

# Full Stack Docker Compose for GramWork
# This includes Frontend + All Backend Microservices

services:
  # ==================== FRONTEND ====================
  gramwork-frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: gramwork-frontend
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - auth-service
      - profile-service
      - job-service
      - assignment-service
      - attendance-service
      - payment-service
      - matching-service
      - notification-service
    restart: unless-stopped
    networks:
      - gramwork-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== BACKEND SERVICES ====================
  
  # Auth Service (Port 8081)
  auth-service:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=jdbc:postgresql://postgres:5432/gramwork_auth
      - DATABASE_USERNAME=gramwork
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:?Set DATABASE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - gramwork-network

  # Profile Service (Port 8082)
  profile-service:
    build:
      context: ./ProfileService
      dockerfile: Dockerfile
    container_name: profile-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=jdbc:postgresql://postgres:5432/gramwork_profile
      - DATABASE_USERNAME=gramwork
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:?Set DATABASE_PASSWORD}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - gramwork-network

  # Job Service (Port 8083)
  job-service:
    build:
      context: ./JobService
      dockerfile: Dockerfile
    container_name: job-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=jdbc:postgresql://postgres:5432/gramwork_job
      - DATABASE_USERNAME=gramwork
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:?Set DATABASE_PASSWORD}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - gramwork-network

  # Assignment Service (Port 8084)
  assignment-service:
    build:
      context: ./Assignment-Service
      dockerfile: Dockerfile
    container_name: assignment-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=jdbc:postgresql://postgres:5432/gramwork_assignment
      - DATABASE_USERNAME=gramwork
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:?Set DATABASE_PASSWORD}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - gramwork-network

  # Attendance Service (Port 8085)
  attendance-service:
    build:
      context: ./Attendance-Service
      dockerfile: Dockerfile
    container_name: attendance-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=jdbc:postgresql://postgres:5432/gramwork_attendance
      - DATABASE_USERNAME=gramwork
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:?Set DATABASE_PASSWORD}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - gramwork-network

  # Payment Service (Port 8086)
  payment-service:
    build:
      context: ./Payment-Service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=jdbc:postgresql://postgres:5432/gramwork_payment
      - DATABASE_USERNAME=gramwork
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:?Set DATABASE_PASSWORD}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - gramwork-network

  # AI Matching Service (Port 8087)
  matching-service:
    build:
      context: ./AiMatchingService
      dockerfile: Dockerfile
    container_name: matching-service
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=jdbc:postgresql://postgres:5432/gramwork_matching
      - DATABASE_USERNAME=gramwork
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:?Set DATABASE_PASSWORD}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - gramwork-network

  # Notification Service (Port 8088)
  notification-service:
    build:
      context: ./Notification-Service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8088:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=jdbc:postgresql://postgres:5432/gramwork_notification
      - DATABASE_USERNAME=gramwork
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:?Set DATABASE_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - gramwork-network

  # ==================== DATABASES & CACHE ====================
  
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: gramwork-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-gramwork}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      - POSTGRES_DB=gramwork
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    restart: unless-stopped
    networks:
      - gramwork-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gramwork"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    container_name: gramwork-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - gramwork-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==================== MONITORING (Optional) ====================
  
  # Nginx Reverse Proxy (Optional)
  # nginx-proxy:
  #   image: nginx:1.25-alpine
  #   container_name: gramwork-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf
  #     - ./nginx/ssl:/etc/nginx/ssl
  #   depends_on:
  #     - gramwork-frontend
  #   restart: unless-stopped
  #   networks:
  #     - gramwork-network

networks:
  gramwork-network:
    driver: bridge
    name: gramwork-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
