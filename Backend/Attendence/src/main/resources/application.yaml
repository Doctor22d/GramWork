spring:
  application:
    name: Attendence
  data:
    mongodb:
      uri: mongodb://localhost:27017/gramwork
      database: gramwork
server:
  port: 8090

rabbitmq:
  exchange:
    notification: notification.exchange
  routing-key:
    notification: notification.routing.key

---
spring:
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000

eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost
  client:
    service-url:
      defaultZone: http://eureka:eureka123@localhost:8761/eureka/
