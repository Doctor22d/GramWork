server:
  port: 8088

spring:
  application:
    name: NotificationService

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/gramwork}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 3s
          max-attempts: 3
          max-interval: 10s
          multiplier: 2.0

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000

rabbitmq:
  exchange:
    notification: notification.exchange
    dlx: notification.dlx
  queue:
    notification: notification.queue
    dlq: notification.dlq
  routing-key:
    notification: notification.routing.key
    dlq: notification.dlq.routing.key

eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost
  client:
    service-url:
      defaultZone: http://eureka:eureka123@localhost:8761/eureka/
