# ============================================
# Networks
# ============================================

networks:
  gramwork-network:
    driver: bridge
    name: gramwork-network

# ============================================
# Volumes
# ============================================

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
