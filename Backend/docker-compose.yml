version: '3.8'

services:
  # ============================================
  # Infrastructure Services
  # ============================================
  
  mongodb:
    image: mongo:7.0
    container_name: gramwork-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - gramwork-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: gramwork-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - gramwork-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: gramwork-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - gramwork-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ============================================
  # Monitoring Services
  # ============================================

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: gramwork-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    environment:
      STORAGE_TYPE: mem
    networks:
      - gramwork-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9411/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ============================================
  # Core Services
  # ============================================

  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    image: gramwork/config-server:latest
    container_name: gramwork-config-server
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      CONFIG_USERNAME: ${CONFIG_USERNAME:-config}
      CONFIG_PASSWORD: ${CONFIG_PASSWORD:-config123}
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
    volumes:
      - ./config-repository:/config-repository:ro
    networks:
      - gramwork-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    image: gramwork/eureka-server:latest
    container_name: gramwork-eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka123}
      EUREKA_HOSTNAME: eureka-server
    networks:
      - gramwork-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================
  # API Gateway
  # ============================================

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: gramwork/api-gateway:latest
    container_name: gramwork-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      CONFIG_SERVER_URL: http://config-server:8888
      CONFIG_USERNAME: ${CONFIG_USERNAME:-config}
      CONFIG_PASSWORD: ${CONFIG_PASSWORD:-config123}
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-gramwork-secret-key-for-authentication}
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gramwork-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ============================================
