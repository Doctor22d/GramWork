spring:
  application:
    name: laborer-profile
  data:
    mongodb:
      uri: mongodb://localhost:27017/gramwork

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: 8081

eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost
  client:
    service-url:
      defaultZone: http://eureka:eureka123@localhost:8761/eureka/

aws:
  access-key: ${AWS_ACCESS_KEY:YOUR_ACCESS_KEY_HERE}
  secret-key: ${AWS_SECRET_KEY:YOUR_SECRET_KEY_HERE}
  region: ${AWS_REGION:eu-north-1}
  s3:
    bucket-name: ${AWS_S3_BUCKET:gramwork-bucket}

rabbitmq:
  exchange:
    notification: notification.exchange
    profile-delete: profile.delete.exchange
    profile-delete-wait: profile.delete.wait.exchange
  queue:
    profile-delete: profile.delete.queue
    profile-delete-wait: profile.delete.wait.queue
  routing-key:
    notification: notification.routing.key
    profile-delete: profile.delete.routing.key
    profile-delete-wait: profile.delete.wait.routing.key


profile:
  delete:
    ttl: ${PROFILE_DELETE_TTL:86400000}

---
spring:
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
