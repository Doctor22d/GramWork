server:
  port: 8761

spring:
  application:
    name: eureka-server
  
  # Security Configuration (Production)
  security:
    user:
      name: ${EUREKA_USERNAME:eureka}
      password: ${EUREKA_PASSWORD:eureka123}

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
    
  server:
    # Production Settings for High Availability
    enable-self-preservation: true
    eviction-interval-timer-in-ms: 60000
    renewal-percent-threshold: 0.85
    response-cache-update-interval-ms: 30000
    # Disable dashboard in production for security
    enable-dashboard: ${EUREKA_DASHBOARD:true}
    
  # Wait time before starting eviction of services
  wait-time-in-ms-when-sync-empty: 5000

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    defaults:
      enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
    com.gramwork: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/eureka-server.log

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

eureka:
  server:
    enable-dashboard: true
  
logging:
  level:
    root: DEBUG
    com.netflix.eureka: DEBUG
    com.netflix.discovery: DEBUG

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

eureka:
  server:
    enable-dashboard: false
    enable-self-preservation: true

logging:
  level:
    root: WARN
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
    com.gramwork: INFO

---
# Docker Profile
spring:
  config:
    activate:
      on-profile: docker

eureka:
  instance:
    hostname: eureka-server
    prefer-ip-address: false
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
