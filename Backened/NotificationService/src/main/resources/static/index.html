<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GramWork Notifications</title>
    <!-- SockJS and STOMP for WebSockets -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --primary-color: #3b82f6;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #10b981;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.1), transparent 40%);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .header {
            margin-top: 50px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        button {
            background: linear-gradient(135deg, var(--primary-color), #2563eb);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }

        /* Notification Feed */
        .feed-container {
            margin-top: 40px;
            width: 100%;
            max-width: 450px;
            height: calc(100vh - 250px);
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: none; /* Firefox */
        }
        .feed-container::-webkit-scrollbar {
            display: none; /* Chrome */
        }

        /* Beautiful Swiggy/Blinkit Style Notification Card */
        .notification-card {
            background: var(--surface-color);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateX(-50px) scale(0.95);
            animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .notification-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .notification-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .notification-content {
            flex-grow: 1;
        }

        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .category-badge {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 5px 0;
            color: #fff;
        }

        .message {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.4;
            margin: 0 0 10px 0;
        }

        .metadata {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .metadata strong {
            color: #cbd5e1;
        }

        .action-link {
            display: inline-block;
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
            transition: background 0.2s;
        }

        .action-link:hover {
            background: rgba(59, 130, 246, 0.3);
        }

        .status-dot {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 8px;
            height: 8px;
            background: var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-color);
        }

        #connection-status {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
        }

        .connected { color: #34d399; }
        .disconnected { color: #f87171; }

    </style>
</head>
<body>

    <div id="connection-status" class="disconnected">Disconnected</div>

    <div class="header">
        <h1>In-App Notifications</h1>
        <div class="subtitle">Live WebSocket Feed</div>
        
        <div class="actions">
            <button onclick="triggerTestNotification()">Trigger Test Alert</button>
            <button class="btn-secondary" onclick="clearFeed()">Clear Feed</button>
        </div>
    </div>

    <div class="feed-container" id="feed">
        <!-- Notifications will appear here -->
    </div>

    <script>
        let stompClient = null;
        const USER_ID = 'user123'; // Hardcoded for demo

        function connect() {
            const socket = new SockJS('/ws-notifications');
            stompClient = Stomp.over(socket);
            
            // Hide debug logs
            stompClient.debug = null;

            stompClient.connect({}, function (frame) {
                const statusEl = document.getElementById('connection-status');
                statusEl.textContent = '🟢 Connected to Live Feed';
                statusEl.className = 'connected';
                
                // Subscribe to the public topic
                stompClient.subscribe('/topic/notifications', function (message) {
                    const notification = JSON.parse(message.body);
                    renderNotification(notification);
                });
            }, function(error) {
                const statusEl = document.getElementById('connection-status');
                statusEl.textContent = '🔴 Disconnected';
                statusEl.className = 'disconnected';
                setTimeout(connect, 5000); // Reconnect logic
            });
        }

        function triggerTestNotification() {
            fetch('/api/notifications/test', { method: 'POST' })
                .then(res => console.log('Triggered successfully'))
                .catch(err => console.error(err));
        }

        function clearFeed() {
            document.getElementById('feed').innerHTML = '';
        }

        function renderNotification(data) {
            const feed = document.getElementById('feed');
            
            // Format time
            const date = data.createdAt ? new Date(data.createdAt) : new Date();
            const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            // Format metadata
            let metadataHtml = '';
            if (data.metadata && Object.keys(data.metadata).length > 0) {
                metadataHtml = '<div class="metadata">';
                for (const [key, value] of Object.entries(data.metadata)) {
                    metadataHtml += `<div><strong>${key}:</strong> ${value}</div>`;
                }
                metadataHtml += '</div>';
            }

            // Fallback image if none provided
            const imageSrc = data.imageUrl || 'https://cdn-icons-png.flaticon.com/512/3239/3239952.png';

            const cardHtml = `
                <div class="notification-card">
                    ${!data.isRead ? '<div class="status-dot"></div>' : ''}
                    <div class="notification-icon">
                        <img src="${imageSrc}" alt="icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3239/3239952.png'">
                    </div>
                    <div class="notification-content">
                        <div class="notification-header">
                            <span class="category-badge">${data.category || 'NOTIFICATION'}</span>
                            <span class="time">${timeStr}</span>
                        </div>
                        <h3 class="title">${data.title}</h3>
                        <p class="message">${data.message}</p>
                        ${metadataHtml}
                        ${data.actionUrl ? `<a href="#" class="action-link" onclick="alert('Navigating to: ${data.actionUrl}')">View Details &rarr;</a>` : ''}
                    </div>
                </div>
            `;

            // Insert at the top of the feed
            feed.insertAdjacentHTML('afterbegin', cardHtml);
        }

        // Connect on load
        window.onload = connect;
    </script>
</body>
</html>
