spring:
  application:
    name: employer-profile-service
  
  cloud:
    config:
      uri: ${CONFIG_SERVER_URL:http://localhost:8888}
      username: ${CONFIG_USERNAME:config}
      password: ${CONFIG_PASSWORD:config123}
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        multiplier: 1.5
        max-interval: 2000
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
